id: spread_rx_synthesizer
label: FHSS RX Synthesizer
category: '[spread]'

templates:
  imports: from gnuradio import spread
  make: spread.rx_synthesizer(${samples_per_hop}, ${samples_per_symbol}, ${sample_rate}, ${high_freq}, ${transition}, ${energy_threshold}, ${gen}, ${init})

parameters:
- id: samples_per_hop
  label: Samples per Hop
  dtype: int
  default: '100'
- id: samples_per_symbol
  label: Samples per Symbol
  dtype: int
  default: '8'
- id: sample_rate
  label: Sample Rate
  dtype: real
  default: samp_rate
- id: high_freq
  label: High Freq
  dtype: real
  default: '1000.0'
- id: transition
  label: Transition Width
  dtype: real
  default: '500.0'
- id: energy_threshold
  label: Energy Threshold
  dtype: real
  default: '0.1'
- id: gen
  label: Generator Polynomial
  dtype: int_vector
  default: '[1, 0, 0, 1, 1]'
- id: init
  label: Initial State
  dtype: int_vector
  default: '[1, 1, 1, 1, 1]'

inputs:
- label: in
  domain: stream
  dtype: complex

outputs:
- label: out
  domain: stream
  dtype: complex

file_format: 1
