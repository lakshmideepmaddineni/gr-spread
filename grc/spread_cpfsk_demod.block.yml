id: spread_cpfsk_demod
label: CPFSK Demodulator
category: '[spread]'

templates:
  imports: from gnuradio import spread
  make: spread.cpfsk_demod(${samples_per_symbol})

parameters:
- id: samples_per_symbol
  label: Samples per Symbol
  dtype: int
  default: '8'

inputs:
- label: in
  domain: stream
  dtype: complex

outputs:
- label: bits
  domain: stream
  dtype: byte

file_format: 1
