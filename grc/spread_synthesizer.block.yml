id: spread_synthesizer
label: FHSS Synthesizer
category: '[spread]'

templates:
  imports: from gnuradio import spread
  make: spread.synthesizer(${samples_per_hop}, ${delay}, ${sample_rate}, ${gen}, ${init})

parameters:
- id: samples_per_hop
  label: Samples per Hop
  dtype: int
  default: '100'
- id: delay
  label: Delay
  dtype: int
  default: '0'
- id: sample_rate
  label: Sample Rate
  dtype: real
  default: samp_rate
- id: gen
  label: Generator Polynomial
  dtype: int_vector
  default: '[1, 0, 0, 1, 1]'
- id: init
  label: Initial State
  dtype: int_vector
  default: '[1, 1, 1, 1, 1]'

inputs:
- label: in
  domain: stream
  dtype: complex

outputs:
- label: out
  domain: stream
  dtype: complex

file_format: 1
